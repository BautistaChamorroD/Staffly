<main class="flex min-h-screen items-center justify-center bg-brand-bg px-4">
  <ui-card class="w-full max-w-sm">
    <h1 class="mb-2 text-center font-heading text-2xl font-bold text-brand-ink">Cambiar contraseña</h1>
    <p class="mb-6 text-center text-sm text-brand-muted">
      Por seguridad, elegí una contraseña nueva antes de continuar.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <ui-input
        label="Contraseña actual"
        type="password"
        formControlName="currentPassword"
        autocomplete="current-password"
        [errorMessage]="currentPasswordErrorMessage"
      ></ui-input>

      <ui-input
        label="Contraseña nueva"
        type="password"
        formControlName="newPassword"
        autocomplete="new-password"
        [errorMessage]="newPasswordErrorMessage"
      ></ui-input>

      <ui-input
        label="Repetir contraseña nueva"
        type="password"
        formControlName="confirmPassword"
        autocomplete="new-password"
        [errorMessage]="confirmPasswordErrorMessage"
      ></ui-input>

      @if (errorMessage) {
        <p class="rounded-lg bg-badge-error-bg p-3 text-sm text-badge-error-ink" role="alert">{{ errorMessage }}</p>
      }

      <button ui-button type="submit" [disabled]="isLoading" class="w-full">
        @if (isLoading) {
          Guardando...
        } @else {
          Cambiar contraseña
        }
      </button>
    </form>
  </ui-card>
</main>
