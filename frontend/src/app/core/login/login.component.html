<main class="flex min-h-screen items-center justify-center bg-brand-bg px-4">
  <ui-card class="w-full max-w-sm">
    <h1 class="mb-6 text-center font-heading text-2xl font-bold text-brand-ink">Staffly</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <ui-input
        label="Email"
        type="email"
        formControlName="email"
        autocomplete="username"
        [errorMessage]="emailErrorMessage"
      ></ui-input>

      <ui-input
        label="Contraseña"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        [errorMessage]="passwordErrorMessage"
      ></ui-input>

      @if (errorMessage) {
        <p class="rounded-lg bg-badge-error-bg p-3 text-sm text-badge-error-ink" role="alert">{{ errorMessage }}</p>
      }

      <button ui-button type="submit" [disabled]="isLoading" class="w-full">
        @if (isLoading) {
          Ingresando...
        } @else {
          Iniciar sesión
        }
      </button>
    </form>
  </ui-card>
</main>
