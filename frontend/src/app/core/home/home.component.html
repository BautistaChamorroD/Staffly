<main class="flex min-h-screen flex-col items-center justify-center gap-4 bg-gray-50">
  <h1 class="text-2xl font-bold text-gray-900">Sesión iniciada</h1>
  <p class="text-gray-700">Rol: <span class="font-semibold">{{ rol }}</span></p>
  @if (companyId) {
    <p class="text-gray-700">Empresa: <span class="font-mono text-sm">{{ companyId }}</span></p>
  }
  <button
    type="button"
    (click)="onLogout()"
    class="rounded bg-blue-600 px-4 py-2 font-medium text-white"
  >
    Cerrar sesión
  </button>
</main>
