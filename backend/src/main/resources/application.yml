spring:
  application:
    name: backend
  profiles:
    active: dev

staffly:
  security:
    jwt:
      access-token-minutes: 30
      refresh-token-days: 7

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:staffly
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true

staffly:
  security:
    jwt:
      secret: dev-only-secret-key-not-for-production-use-change-me-1234567890

---
spring:
  config:
    activate:
      on-profile: postgres-local
  datasource:
    url: jdbc:postgresql://localhost:5432/staffly
    driver-class-name: org.postgresql.Driver
    username: staffly
    password: staffly
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true

staffly:
  security:
    jwt:
      secret: dev-only-secret-key-not-for-production-use-change-me-1234567890

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

staffly:
  security:
    jwt:
      secret: ${JWT_SECRET}
